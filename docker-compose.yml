services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: avifarm-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AviFarm@2024!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/init:/docker-init:ro
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "AviFarm@2024!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: avifarm-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/init:/docker-init:ro
    environment:
      MSSQL_SA_PASSWORD: "AviFarm@2024!"
    entrypoint: ["/bin/bash", "/docker-init/init.sh"]
    restart: "no"

volumes:
  sqlserver_data:
